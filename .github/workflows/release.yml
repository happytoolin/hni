name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Choose the release type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: patch
      is_prerelease:
        description: "Is this a pre-release?"
        required: false
        type: boolean
        default: false
      prerelease_id:
        description: "Prerelease identifier (e.g., alpha, beta, rc). Used only if is_prerelease=true."
        required: false
        type: string
        default: "alpha"

permissions:
  contents: write

jobs:
  update_version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.update_version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Calculate new version
        id: update_version
        run: |
          # Get current version from Cargo.toml
          CURRENT_VERSION=$(grep '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')

          # Split version into parts
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3 | cut -d- -f1)

          # Calculate new version based on release type
          case "${{ github.event.inputs.release_type }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          # Add prerelease suffix if needed
          if [ "${{ github.event.inputs.is_prerelease }}" = "true" ]; then
            NEW_VERSION="${NEW_VERSION}-${{ github.event.inputs.prerelease_id }}"
          fi

          # Update Cargo.toml
          sed -i "s/^version = .*/version = \"${NEW_VERSION}\"/" Cargo.toml

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumping version from ${CURRENT_VERSION} to ${NEW_VERSION}"

  build:
    needs: update_version
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os-name: Linux-x86_64
            runs-on: ubuntu-20.04
            target: x86_64-unknown-linux-musl
          - os-name: Linux-aarch64
            runs-on: ubuntu-20.04
            target: aarch64-unknown-linux-musl
          - os-name: Windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
          - os-name: macOS-x86_64
            runs-on: macos-latest
            target: x86_64-apple-darwin
          - os-name: macOS-aarch64
            runs-on: macos-latest
            target: aarch64-apple-darwin

    name: Build - ${{ matrix.platform.os-name }}
    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.platform.target }}
          args: "--locked --release"
          strip: true

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          # Function to copy binaries with proper extension
          copy_binary() {
            local bin=$1
            local ext=""
            if [[ "${{ matrix.platform.target }}" == *"windows"* ]]; then
              ext=".exe"
            fi

            cp "target/${{ matrix.platform.target }}/release/${bin}${ext}" \
               "artifacts/${bin}-${{ matrix.platform.os-name }}${ext}"

            if [[ "${{ matrix.platform.target }}" != *"windows"* ]]; then
              chmod +x "artifacts/${bin}-${{ matrix.platform.os-name }}"
            fi
          }

          # Copy all binaries
          copy_binary "ni"
          copy_binary "nr"
          copy_binary "na"
          copy_binary "nlx"
          copy_binary "nun"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform.os-name }}
          path: artifacts/*

  release:
    needs: [update_version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.update_version.outputs.new_version }}
        run: |
          # Prepare release notes
          echo "Release version $VERSION" > release_notes.md
          echo "## Changes" >> release_notes.md
          echo "See the [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.md

          # Create release
          gh release create "v$VERSION" \
            --title "Release v$VERSION" \
            --notes-file release_notes.md \
            --draft=false \
            --prerelease=${{ github.event.inputs.is_prerelease }} \
            artifacts/*/*

      - name: Update the Cargo.toml
        run: |
          sed -i "s/^version = .*/version = \"${NEW_VERSION}\"/" Cargo.toml

      - name: Update Cargo.toml and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Cargo.toml Cargo.lock
          git commit -m "Bump version to ${{ needs.update_version.outputs.new_version }}"
          git tag "v${{ needs.update_version.outputs.new_version }}"
          git push && git push --tags
