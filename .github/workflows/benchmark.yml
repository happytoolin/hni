name: Benchmark

on:
  pull_request:
    paths:
      - .github/workflows/benchmark.yml
      - benchmark/**
      - Cargo.toml
      - Cargo.lock
      - package.json
      - package-lock.json
      - scripts/**
      - src/**
      - tests/**
      - bin/**
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3

      - name: Setup Deno
        uses: denoland/setup-deno@v2.0.3
        with:
          deno-version: v2.x

      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine
          npm i -g pnpm yarn@1

      - name: Run benchmark suite
        run: ./benchmark/run.sh

      - name: Locate benchmark artifacts
        id: benchmark_artifacts
        run: |
          set -euo pipefail
          combined_json="$(ls -t benchmark/results/benchmark-*.json | head -n 1)"
          combined_md="$(ls -t benchmark/results/benchmark-*.md | head -n 1)"
          comment_md="benchmark/results/pr-benchmark-comment.md"
          node ./scripts/render-benchmark-comment.mjs "$combined_json" > "$comment_md"
          {
            echo "combined_json=$combined_json"
            echo "combined_md=$combined_md"
            echo "comment_md=$comment_md"
          } >> "$GITHUB_OUTPUT"

      - name: Publish workflow summary
        run: cat "${{ steps.benchmark_artifacts.outputs.comment_md }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            benchmark/LATEST.md
            benchmark/HISTORY.md
            benchmark/results/*.md
            benchmark/results/*.json
          if-no-files-found: error

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        env:
          COMMENT_PATH: ${{ steps.benchmark_artifacts.outputs.comment_md }}
        with:
          script: |
            const fs = require('node:fs')
            const marker = '<!-- hni-benchmark-report -->'
            const body = fs.readFileSync(process.env.COMMENT_PATH, 'utf8')
            const issue_number = context.payload.pull_request.number

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              })
            }
